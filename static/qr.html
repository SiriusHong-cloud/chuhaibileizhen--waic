<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出海避雷针⚡ - 活动二维码</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0B1120;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 16px;
        }
        .page-title {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #0EA5E9, #06B6D4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }
        .page-subtitle {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 28px;
        }
        .qr-card {
            background: #111827;
            border: 1px solid rgba(14,165,233,0.15);
            border-radius: 18px;
            padding: 24px 20px;
            margin-bottom: 18px;
            text-align: center;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .qr-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .qr-card:nth-child(1)::before { background: linear-gradient(90deg, #0EA5E9, #06B6D4); }
        .qr-card:nth-child(2)::before { background: linear-gradient(90deg, #F97316, #FB923C); }
        .qr-card-num {
            position: absolute;
            top: 12px;
            left: 16px;
            font-size: 11px;
            font-weight: 700;
            color: #475569;
        }
        .qr-card img {
            width: 240px;
            height: 240px;
            border-radius: 14px;
            background: white;
            padding: 16px;
            margin-bottom: 14px;
        }
        .qr-card h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .qr-card .desc {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .qr-card a {
            display: inline-block;
            color: #38BDF8;
            font-size: 12px;
            text-decoration: none;
            padding: 6px 16px;
            border: 1px solid rgba(56,189,248,0.3);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .qr-card a:hover {
            background: #38BDF8;
            color: #0f172a;
        }
        .status-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 8px;
        }
        .status-ready { background: rgba(16,185,129,0.15); color: #34D399; }
        .status-pending { background: rgba(245,158,11,0.15); color: #FBBF24; }
        .feature-badges {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .feature-badge {
            font-size: 10px;
            background: rgba(14,165,233,0.1);
            color: #38BDF8;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 500;
        }
        .tip {
            font-size: 11px;
            color: #475569;
            margin-top: 20px;
            text-align: center;
            max-width: 340px;
            line-height: 1.7;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: rgba(14,165,233,0.3);
            border-radius: 1px;
            margin: 8px auto;
        }
    </style>
</head>
<body>
    <span class="page-title">出海避雷针⚡</span>
    <p class="page-subtitle">活动二维码 · 长按图片保存到手机</p>

    <!-- QR 1: 项目主页（介绍页 + GitHub 源码 合并） -->
    <div class="qr-card">
        <span class="qr-card-num">#1</span>
        <img src="/static/project_intro.png" alt="项目主页二维码">
        <h2>项目主页</h2>
        <p class="desc">扫码查看精美图文介绍 + GitHub 源码<br>14大模块功能、UI预览、核心亮点，一键进仓库</p>
        <a href="https://siriushong-cloud.github.io/chuhaibileizhen--waic/" target="_blank">打开主页</a>
        <div class="feature-badges">
            <span class="feature-badge">📚 图文介绍</span>
            <span class="feature-badge">⭐ GitHub</span>
            <span class="feature-badge">🎨 地球蓝</span>
        </div>
        <br><span class="status-tag status-ready">✅ 长期有效</span>
    </div>

    <!-- QR 2: 小红书（占位） -->
    <div class="qr-card">
        <span class="qr-card-num">#2</span>
        <div style="width:240px;height:240px;border-radius:14px;background:#1E293B;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px;border:2px dashed rgba(255,255,255,0.1);">
            <span style="font-size:48px;margin-bottom:8px;">📱</span>
            <span style="font-size:13px;color:#64748B;">小红书二维码</span>
            <span style="font-size:11px;color:#475569;">待提供链接后生成</span>
        </div>
        <h2>小红书主页</h2>
        <p class="desc">扫码关注小红书，获取更多出海干货</p>
        <span class="status-tag status-pending">⏳ 等待链接</span>
    </div>

    <div class="divider"></div>
    
    <p class="tip">
        💡 <b>项目主页</b>已通过 GitHub Pages 正式部署<br>
        稳定可靠，长期有效，扫码后顶部按钮可一键进 GitHub 仓库<br><br>
        📱 小红书二维码请提供主页链接，我来生成
    </p>
</body>
</html>
